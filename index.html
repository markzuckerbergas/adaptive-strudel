<!doctype html>
<!--
  Adaptive-music game POC — "single track" version.

  A tiny top-down game where the MUSIC follows the player:
  - Left side  = safe zone   -> calm, dreamy melody
  - Right side = enemy zone  -> the beat builds, layer by layer

  How the music adapts (v2, after advice from the Strudel Discord):
  ONE stack() is started once and never re-evaluated. Every layer's gain
  (and some filter cutoffs) is a Strudel signal() that samples the game's
  `danger` variable (0..1) on every query — so the mix follows the player
  CONTINUOUSLY. Each layer fades in over its own danger window (see ramp()),
  which staggers the entrances: melody -> heartbeat kick -> four-on-the-floor
  -> hats/bass -> snare -> full drive. No evaluate() hot-swaps, no discrete
  intensity levels, no hysteresis needed.

  Run: double-click this file, or `python3 -m http.server` and open
  http://localhost:8000 - then click START (browsers only allow audio
  after a click).
-->
<html>
<head>
<meta charset="utf-8" />
<title>Strudel adaptive-music game</title>
<style>
  body { font-family: system-ui, sans-serif; background: #14161a; color: #eee;
         display: flex; flex-direction: column; align-items: center; gap: .6rem; }
  canvas { border: 1px solid #444; border-radius: 6px; }
  #hud { display: flex; align-items: center; gap: 1rem; width: 800px; }
  #meter { flex: 1; height: 14px; background: #2a2d33; border-radius: 7px; overflow: hidden; }
  #meterFill { height: 100%; width: 0%; background: linear-gradient(90deg, #3ecf6a, #e8c33a, #e05252); }
  button { padding: .45rem 1.2rem; border: 0; border-radius: 6px; font-size: 1rem; cursor: pointer; }
  #level { min-width: 11rem; text-align: right; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<h3>Strudel adaptive music — walk right toward the enemies (WASD / arrows)</h3>
<div id="hud">
  <button id="start">▶ start</button>
  <button id="stop">■ stop</button>
  <div id="meter"><div id="meterFill"></div></div>
  <div id="level">danger 0.00</div>
</div>
<canvas id="game" width="800" height="500"></canvas>

<script src="https://unpkg.com/@strudel/web@1.0.3"></script>
<script>
// ---------------------------------------------------------------------------
// Strudel setup
// ---------------------------------------------------------------------------
initStrudel({
  // bd / sd / hh / oh live in the dirt-samples pack
  prebake: () => samples('github:tidalcycles/dirt-samples'),
});

let danger = 0; // 0..1, smoothed every frame by the game loop below

// ramp(from, to): 0 below `from`, 1 above `to`, linear in between.
// Each layer gets its own window, so layers enter one after another as
// danger rises — and fade back out in reverse when it falls.
const ramp = (from, to) => Math.min(1, Math.max(0, (danger - from) / (to - from)));

// sig(fn): a Strudel pattern that calls fn on every query — the live bridge
// between the game's JS state and the running music.
const sig = fn => signal(fn);

// One melody at every intensity (A-minor pentatonic) — the layers around it
// change, so it reads as the same tune intensifying, not a song change.
const MEL = 'a3 [c4 e4] a4 [g4 e4] a3 [c4 e4] g4 [e4 c4]';

// The whole soundtrack: started once, never replaced. Layer order = the
// order they join as you approach the enemies.
function buildTrack() {
  return stack(
    // dreamy half-speed melody — the safe zone sound; fades OUT as danger rises
    note(MEL).slow(2).sound('triangle').lpf(800).room(.6)
      .gain(sig(() => (1 - ramp(.08, .22)) * .5)),

    // full-speed melody — takes over from the dreamy one, brightens with danger
    note(MEL).sound('triangle').room(.4)
      .lpf(sig(() => 900 + ramp(.2, 1) * 2100))
      .gain(sig(() => ramp(.08, .22) * .5)),

    // sawtooth doubling of the melody — extra bite at high danger
    note(MEL).sound('sawtooth').room(.3)
      .lpf(sig(() => 1200 + ramp(.5, 1) * 1600))
      .gain(sig(() => ramp(.5, .75) * .35)),

    // heartbeat kick — enters early, hands over to the four-on-the-floor
    sound('bd ~ ~ ~').gain(sig(() => ramp(.1, .2) * (1 - ramp(.3, .42)) * .8)),
    sound('bd*4').gain(sig(() => ramp(.3, .45) * .9)),

    // offbeat hats + pulsing bass
    sound('[~ hh]*4').gain(sig(() => ramp(.32, .5) * .4)),
    note('a1*4').sound('sawtooth').lpf(500)
      .gain(sig(() => ramp(.35, .55) * (1 - ramp(.75, .85)) * .55)),

    // snare backbeat + busier hats
    sound('~ sd ~ sd').gain(sig(() => ramp(.55, .7) * .7)),
    sound('hh*8').gain(sig(() => ramp(.6, .78) * .4)),

    // full drive: 8th-note bass (replaces the 4ths), 16th hats, open-hat lift
    note('a1*8').sound('sawtooth').lpf(800).gain(sig(() => ramp(.75, .9) * .6)),
    sound('hh*16').gain(sig(() => ramp(.82, .96) * .5)),
    sound('~ ~ ~ ho').gain(sig(() => ramp(.85, 1) * .4)), // ho = open hat in dirt-samples
  ).slow(1.2); // default 0.5 cps = 120 BPM at 4 beats/cycle -> 100 BPM
}

// ---------------------------------------------------------------------------
// Game state
// ---------------------------------------------------------------------------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const SAFE_X = W * 0.33;    // left of this line = fully safe
const DANGER_X = W * 0.66;  // right of this line = full danger

const player = { x: 80, y: H / 2, r: 12, speed: 3.2 };
const enemies = [
  { x: 640, y: 120, r: 10, dx: 1.1, dy: 0.9 },
  { x: 700, y: 300, r: 10, dx: -0.8, dy: 1.2 },
  { x: 600, y: 420, r: 10, dx: 1.3, dy: -0.7 },
];

const keys = {};
addEventListener('keydown', e => { keys[e.key] = true; });
addEventListener('keyup',   e => { keys[e.key] = false; });

// ---------------------------------------------------------------------------
// Main loop
// ---------------------------------------------------------------------------
function step() {
  // move player
  if (keys.ArrowLeft  || keys.a) player.x -= player.speed;
  if (keys.ArrowRight || keys.d) player.x += player.speed;
  if (keys.ArrowUp    || keys.w) player.y -= player.speed;
  if (keys.ArrowDown  || keys.s) player.y += player.speed;
  player.x = Math.max(player.r, Math.min(W - player.r, player.x));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y));

  // move enemies (bounce inside the enemy zone)
  for (const e of enemies) {
    e.x += e.dx; e.y += e.dy;
    if (e.x < DANGER_X + e.r || e.x > W - e.r) e.dx *= -1;
    if (e.y < e.r || e.y > H - e.r) e.dy *= -1;
  }

  // target danger: position ramp + proximity boost from the nearest enemy
  const posRamp = Math.max(0, Math.min(1, (player.x - SAFE_X) / (DANGER_X - SAFE_X)));
  const nearest = Math.min(...enemies.map(e => Math.hypot(e.x - player.x, e.y - player.y)));
  const boost = Math.max(0, 1 - nearest / 220) * 0.35;
  const target = Math.min(1, posRamp + boost);

  // smooth it — the music reads `danger` live, so this easing IS the transition
  danger += (target - danger) * 0.03;

  draw();
  requestAnimationFrame(step);
}

function draw() {
  // zones
  const grad = ctx.createLinearGradient(0, 0, W, 0);
  grad.addColorStop(0, '#173a24'); grad.addColorStop(.33, '#173a24');
  grad.addColorStop(.66, '#3a1717'); grad.addColorStop(1, '#3a1717');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,.06)';
  ctx.fillRect(SAFE_X, 0, 1, H); ctx.fillRect(DANGER_X, 0, 1, H);
  ctx.fillStyle = '#9fdcb2'; ctx.font = '13px system-ui';
  ctx.fillText('SAFE', 20, 24);
  ctx.fillStyle = '#e3a0a0';
  ctx.fillText('ENEMIES', W - 80, 24);

  // enemies + player
  for (const e of enemies) {
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, 7);
    ctx.fillStyle = '#e05252'; ctx.fill();
  }
  ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, 7);
  ctx.fillStyle = '#3ecf6a'; ctx.fill();

  // HUD
  document.getElementById('meterFill').style.width = `${(danger * 100).toFixed(1)}%`;
  document.getElementById('level').textContent = `danger ${danger.toFixed(2)}`;
}

// ---------------------------------------------------------------------------
// Controls (audio may only start after a click — browser autoplay policy)
// ---------------------------------------------------------------------------
document.getElementById('start').addEventListener('click', () => {
  try {
    buildTrack().play(); // starts once; signals do all the adapting from here
  } catch (err) {
    document.getElementById('level').textContent = `audio error: ${err.message}`;
    console.error(err);
  }
});
document.getElementById('stop').addEventListener('click', () => hush());

step();
</script>
</body>
</html>
